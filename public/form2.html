<!DOCTYPE html>
<html lang="hun">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kep feltolto</title>
    <link rel="stylesheet" type="text/css" media="screen" href="stilus.css">
</head>
<body>
    <div id="keret">
        <form id="uploadForm" action="/kep_feltoltes" method="POST" enctype="multipart/form-data">
            <p>Lakás ID-ja: <input type="number" name="id"></p>
            <p>Kép(max 2MB): <input type="file" name="file" accept="image/*"></p>
            <input type="submit" value="Feltöltés">
        </form>
    </div>
</body>
</html>
